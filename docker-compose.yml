version: '3.8'

services:
  pre-service:
    build: ./pre_service
    container_name: pre_service
    ports:
      - "5001:5001"
    volumes:
      - ./pre_service/keys:/app/keys:ro
    restart: unless-stopped

  ipfs:
    image: ipfs/go-ipfs:latest
    container_name: ipfs_node
    ports:
      - "4001:4001"
      - "5002:5001"   # IPFS API on 5002 to avoid conflict with pre_service
      - "8080:8080"
    volumes:
      - ipfs_data:/data/ipfs
    restart: unless-stopped

  mongo:
    image: mongo:6
    container_name: mongo_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  ipfs_data:
  mongo_data: